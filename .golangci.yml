version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - ineffassign
    - unused
  settings:
    staticcheck:
      checks:
        - all
        - -SA1019
        - -ST1000
        - -ST1003
  exclusions:
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - path: cmd/
        linters:
          - errcheck

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
