name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install & Build
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Package frontend
        run: tar czf geekscan-frontend.tar.gz -C web/dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: geekscan-frontend
          path: geekscan-frontend.tar.gz

  backend:
    name: Build Backend (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME}"
          SUFFIX=""
          if [ "$GOOS" = "windows" ]; then SUFFIX=".exe"; fi

          mkdir -p dist

          for cmd in api worker cli; do
            go build -ldflags="-s -w -X main.version=${VERSION}" \
              -o "dist/${cmd}${SUFFIX}" "./cmd/${cmd}"
          done

          cp -r configs dist/
          cp -r dictionaries dist/

          cd dist
          tar czf "../geekscan-${GOOS}-${GOARCH}.tar.gz" *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: geekscan-${{ matrix.goos }}-${{ matrix.goarch }}
          path: geekscan-*.tar.gz

  publish:
    name: Publish Release
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.tar.gz
