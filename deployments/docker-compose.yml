version: "3.8"

services:
  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    depends_on:
      - temporal-db

  temporal-db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8233:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  api:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
      target: api
    ports:
      - "8080:8080"
    depends_on:
      - temporal
      - mongodb
    environment:
      - DS_TEMPORAL_HOST=temporal:7233
      - DS_MONGODB_URI=mongodb://mongodb:27017

  worker:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
      target: worker
    depends_on:
      - temporal
      - mongodb
    environment:
      - DS_TEMPORAL_HOST=temporal:7233
      - DS_MONGODB_URI=mongodb://mongodb:27017
    deploy:
      replicas: 2

volumes:
  mongo-data:
